<svg width="900" height="85" viewBox="0 0 900 85" xmlns="http://www.w3.org/2000/svg">

<style>
.title{
font-family:"JetBrains Mono","Fira Code","Consolas",monospace;
font-size:30px;
font-weight:700;
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}
</style>

<rect width="900" height="85" fill="transparent"/>

<!-- Left part -->
<text
x="430"
y="55"
text-anchor="end"
class="title"
fill="#E6EDF3">

&gt; Hey There!, I'm

</text>

<!-- Name -->
<text
x="450"
y="55"
text-anchor="start"
class="title"
fill="#A855F7">

Jasleen Kaur

</text>

<!-- Cursor -->
<text
x="715"
y="55"
class="title cursor"
fill="#A855F7">

▋

</text>

</svg>
